services:
  shopping-db:
    image: postgres:16
    container_name: shopping-db
    environment:
      POSTGRES_DB: shopping_cart
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    networks:
      - shopping-network

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://shopping-db:5432/shopping_cart
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      - shopping-db
    networks:
      - shopping-network

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://shopping-db:5432/shopping_cart
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      - shopping-db
    networks:
      - shopping-network

networks:
  shopping-network:
    driver: bridge
